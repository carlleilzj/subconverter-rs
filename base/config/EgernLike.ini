[custom]
; 自定义规则 — 从 Egern Profile.yaml 迁移
; 策略组: 🇺🇸 美国 / 🇰🇷 韩国 / 🇭🇰 香港 / 🇯🇵 日本 / PROXY / 🐟 漏网之鱼

; ============ 规则集定义 (规则 → 策略组) ============

; 🇺🇸 美国
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTube/YouTube.list
ruleset=🇺🇸 美国,https://cdn.jsdelivr.net/gh/VPSDance/ai-proxy-rules@main/rules/egern/all.yaml
ruleset=🇺🇸 美国,https://cdn.jsdelivr.net/gh/VPSDance/ai-proxy-rules@main/rules/egern/coding.yaml
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Instagram/Instagram.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Whatsapp/Whatsapp.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TikTok/TikTok.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/OpenAI/OpenAI.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/PayPal/PayPal.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/GitHub/GitHub.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Facebook/Facebook.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Netflix/Netflix.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Disney/Disney.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Amazon/Amazon.list
ruleset=🇺🇸 美国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Adobe/Adobe.list

; 🇰🇷 韩国
ruleset=🇰🇷 韩国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Twitter/Twitter.list
ruleset=🇰🇷 韩国,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Binance/Binance.list

; 🇭🇰 香港
ruleset=🇭🇰 香港,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Spotify/Spotify.list
ruleset=🇭🇰 香港,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Bahamut/Bahamut.list

; 📲 电报消息
ruleset=📲 电报消息,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Telegram/Telegram.list

; 🚀 PROXY (Speedtest 等走通用代理)
ruleset=🚀 PROXY,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Speedtest/Speedtest.list

; 🎯 全球直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Tencent/Tencent.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/DouYin/DouYin.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,[]GEOIP,CN

; 🐟 漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL

; ============ 策略组定义 ============

; 顶层选择组
custom_proxy_group=🚀 PROXY`select`[]🇺🇸 美国`[]🇰🇷 韩国`[]🇭🇰 香港`[]🇯🇵 日本`[]DIRECT`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 PROXY`[]🇺🇸 美国`[]🇰🇷 韩国`[]🇭🇰 香港`[]🇯🇵 日本`[]DIRECT`.*
custom_proxy_group=📲 电报消息`select`[]🚀 PROXY`[]🇺🇸 美国`[]🇰🇷 韩国`[]🇭🇰 香港`[]🇯🇵 日本`[]DIRECT`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 PROXY`[]🇺🇸 美国`[]🇰🇷 韩国`[]🇭🇰 香港`[]🇯🇵 日本`.*

; 地区自动测速组 — 匹配用户 Egern 的 filter 规则
custom_proxy_group=🇺🇸 美国`url-test`(圣何塞|洛杉矶|布达佩斯|纽瓦克|西雅图|芝加哥|达拉斯|亚特兰大|曼彻斯特|AUS|华盛顿|迈阿密|美|US|United States)`http://cp.cloudflare.com/generate_204`300,,150
custom_proxy_group=🇰🇷 韩国`url-test`(🇰🇷|KR|Korea|韩国|首尔)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港`url-test`(港|HK|Hong Kong|🇭🇰)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本`url-test`(日|JP|Japan|东京|大阪)`http://cp.cloudflare.com/generate_204`300,,50

; ============ 全局开关 ============

enable_rule_generator=true
overwrite_original_rules=true
